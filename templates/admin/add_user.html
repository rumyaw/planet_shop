{% extends "base.html" %}

{% block title %}Добавить пользователя - Админ-панель{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="gradient-text mb-0">
        <i class="bi bi-plus-circle me-2"></i>Добавить пользователя
    </h1>
    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-2"></i>Назад
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6 col-xl-5">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">
                    <i class="bi bi-info-circle me-2"></i>Информация о пользователе
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="bi bi-envelope me-2"></i>Email
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="user@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="bi bi-lock me-2"></i>Пароль
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="mb-3">
                        <label for="fio" class="form-label">
                            <i class="bi bi-person me-2"></i>ФИО
                        </label>
                        <input type="text" class="form-control" id="fio" name="fio" required placeholder="Иванов Иван Иванович">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">
                            <i class="bi bi-telephone me-2"></i>Телефон
                        </label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+7 (999) 123-45-67">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">
                            <i class="bi bi-shield-check me-2"></i>Роль
                        </label>
                        <select class="form-select" id="role" name="role">
                            <option value="user">Пользователь</option>
                            <option value="admin">Администратор</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-2"></i>Добавить
                        </button>
                        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
